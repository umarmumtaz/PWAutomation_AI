apiVersion: apps/v1
kind: Deployment

metadata:
  name: pw-tests

spec:
  replicas: 1

  selector:
    matchLabels:
      app: pw-tests

  template:
    metadata:
      labels:
        app: pw-tests

    spec:
      containers:
        - name: pw-tests
          image: infodocker7410/pw-tests:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"


        #requests → minimum guaranteed resources for scheduling.
        #limits → maximum resources the container can use